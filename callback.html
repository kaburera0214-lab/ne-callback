<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>認証完了</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f5f5f5; }
    .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .token { font-family: monospace; font-size: 12px; background: #222; color: #0f0;
             padding: 15px; border-radius: 5px; word-break: break-all; }
    button { margin-top: 10px; padding: 10px 20px; background: #1a5c38; color: white;
             border: none; border-radius: 5px; cursor: pointer; font-size: 15px; }
  </style>
</head>
<body>
  <h2 id="title">⏳ 処理中...</h2>
  <div class="box" id="result"></div>

  <script>
    const CLIENT_ID     = '1D78GtxWX2cdfz';
    const CLIENT_SECRET = 'xc9D5QOVR6PyrSTd4IZUbCkfFvJH3tMKiL21jAnz';
    const p     = new URLSearchParams(window.location.search);
    const uid   = p.get('uid')   || '';
    const state = p.get('state') || '';

    document.getElementById('result').innerHTML =
      `<p><b>uid:</b> ${uid}<br><b>state:</b> ${state}</p>`;

    if (uid && state) {
      const body = new URLSearchParams({
        uid, state,
        client_id: CLIENT_ID,
        client_secret: CLIENT_SECRET
      });

      fetch('https://base.next-engine.org/api/neauth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString(),
        credentials: 'include'
      })
      .then(r => r.text())
      .then(text => {
        document.getElementById('title').textContent = '✅ レスポンス取得';
        try {
          const data = JSON.parse(text);
          if (data.access_token) {
            document.getElementById('title').textContent = '✅ トークン取得成功！';
            document.getElementById('result').innerHTML =
              `<p><b>access_token:</b></p>
               <div class="token" id="at">${data.access_token}</div>
               <button onclick="copy('at')">📋 access_tokenをコピー</button>
               <p><b>refresh_token:</b></p>
               <div class="token" id="rt">${data.refresh_token}</div>
               <button onclick="copy('rt')">📋 refresh_tokenをコピー</button>`;
          } else {
            document.getElementById('result').innerHTML =
              `<pre>${JSON.stringify(data, null, 2)}</pre>`;
          }
        } catch(e) {
          document.getElementById('title').textContent = '⚠️ レスポンス（CORSエラーの可能性）';
          document.getElementById('result').innerHTML =
            `<pre>${text.substring(0, 300)}</pre>`;
        }
      })
      .catch(err => {
        document.getElementById('title').textContent = '❌ CORSエラー';
        document.getElementById('result').innerHTML =
          `<pre>${err}</pre><p>uid/stateを下記からコピーしてください。</p>`;
      });
    }

    function copy(id) {
      navigator.clipboard.writeText(document.getElementById(id).textContent);
      alert('コピーしました！');
    }
  </script>
</body>
</html>
