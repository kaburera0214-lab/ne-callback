<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>認証完了</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f5f5f5; }
    .box { background: white; padding: 20px; border-radius: 8px; margin: 10px 0; }
    .cmd { font-family: monospace; font-size: 13px; background: #222; color: #0f0; padding: 15px; border-radius: 5px; word-break: break-all; }
    button { margin-top: 10px; padding: 10px 20px; background: #1a5c38; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; }
    button:hover { background: #2d8a5c; }
  </style>
</head>
<body>
  <h2>✅ 認証完了！</h2>
  <div class="box">
    <p>以下のコマンドをコピーして<strong>コマンドプロンプトに貼り付けてEnterを押してください</strong></p>
    <div class="cmd" id="cmd"></div>
    <button onclick="copy()">📋 コマンドをコピー</button>
    <span id="msg" style="margin-left:10px;color:green;"></span>
  </div>
  <script>
    const p = new URLSearchParams(window.location.search);
    const uid = p.get('uid') || '';
    const state = p.get('state') || '';
    const cmd = 'python C:\\Users\\info\\ne_exchange.py "' + uid + '" "' + state + '"';
    document.getElementById('cmd').textContent = cmd;
    function copy() {
      navigator.clipboard.writeText(cmd);
      document.getElementById('msg').textContent = 'コピーしました！';
    }
  </script>
</body>
</html>
